<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 195" width="840" height="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style><![CDATA[
    :root { --card:#fcfcfd; --line:#d7d7df; --fill:#cfe0fc; --ptr:#d9822b; --muted:#71717a; }
    .card { fill:var(--card); stroke:var(--line); }
    .cell { fill:#ffffff; stroke:var(--line); }
    .fill { fill:var(--fill); }

    .idx  { fill:var(--muted); font-size:11px; font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace; }
    .name { fill:var(--muted); font-size:13px; font-weight:600; letter-spacing:.02em; }
    .anim {
      transform-box: fill-box;
      transform-origin: center;
      animation-duration:8s;
      animation-iteration-count:infinite;
      animation-timing-function:ease-in-out;
    }
    #ptr { animation-name:ptr; }
    /* pair 1 -> fA (offsets 0,+4) ; pair 2 -> fB (+8,+12) ; pair 3 -> fC (+16,+20) */
    #f0{animation-name:fA;} #f1{animation-name:fA;}
    #f2{animation-name:fB;} #f3{animation-name:fB;}
    #f4{animation-name:fC;} #f5{animation-name:fC;}

    @keyframes ptr {
      0%,6%    { transform:translateX(0px); }
      12%,22%  { transform:translateX(76px); }
      28%,38%  { transform:translateX(242px); }
      44%,94%  { transform:translateX(394px); }
      100%     { transform:translateX(0px); }
    }
    @keyframes fA { 0%,11%{opacity:0;} 13%,93%{opacity:1;} 96%,100%{opacity:0;} }
    @keyframes fB { 0%,27%{opacity:0;} 29%,93%{opacity:1;} 96%,100%{opacity:0;} }
    @keyframes fC { 0%,43%{opacity:0;} 45%,93%{opacity:1;} 96%,100%{opacity:0;} }

    @media (prefers-reduced-motion: reduce) {
      .anim { animation:none; }
      #ptr { transform:translateX(394px); }
      #f0,#f1,#f2,#f3,#f4,#f5 { opacity:1; }
    }
  ]]></style>

  <rect class="card" x="1" y="1" width="838" height="193" rx="14"/>
  <rect class="cell" x="70"  y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="146" y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="222" y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="312" y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="388" y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="464" y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="554" y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="630" y="56" width="70" height="64" rx="6"/>
  <rect class="cell" x="706" y="56" width="70" height="64" rx="6"/>

  <rect id="f0" class="anim fill" x="312" y="56" width="70" height="64" rx="6"/>
  <rect id="f1" class="anim fill" x="388" y="56" width="70" height="64" rx="6"/>
  <rect id="f2" class="anim fill" x="464" y="56" width="70" height="64" rx="6"/>
  <rect id="f3" class="anim fill" x="554" y="56" width="70" height="64" rx="6"/>
  <rect id="f4" class="anim fill" x="630" y="56" width="70" height="64" rx="6"/>
  <rect id="f5" class="anim fill" x="706" y="56" width="70" height="64" rx="6"/>
  <line x1="302" y1="50" x2="302" y2="126" stroke="#d9822b" stroke-width="1.5" stroke-dasharray="4 3"/>

  <g id="ptr" class="anim">
    <path d="M347,52 l-9,-13 l18,0 z" fill="#d9822b"/>
  </g>

  <text class="idx" x="105" y="138" text-anchor="middle">-0x0C</text>
  <text class="idx" x="181" y="138" text-anchor="middle">-0x08</text>
  <text class="idx" x="257" y="138" text-anchor="middle">-0x04</text>
  <text class="idx" x="347" y="138" text-anchor="middle">0x00</text>
  <text class="idx" x="423" y="138" text-anchor="middle">0x04</text>
  <text class="idx" x="499" y="138" text-anchor="middle">0x08</text>
  <text class="idx" x="589" y="138" text-anchor="middle">0x0C</text>
  <text class="idx" x="665" y="138" text-anchor="middle">0x10</text>
  <text class="idx" x="741" y="138" text-anchor="middle">0x14</text>

  <line x1="312" y1="154" x2="776" y2="154" stroke="#c9c9d2" stroke-width="1.5"/>
  <text class="name" x="544" y="174" text-anchor="middle">DMA buffer</text>
</svg>
